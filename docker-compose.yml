version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      PORT: '5000'
      DATABASE_FILE: /app/data/control.db
      MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CORS_ORIGIN: http://localhost:3001
      SQLITE_STORAGE_ROOT: /app/data/sqlite
      SQLITE_DISCOVERY_PATH: /app/data/sqlite
      SQLITE_DISCOVERY_ADOPT: 'false'
      DATABASE_PUBLIC_HOST: host.docker.internal
      DATABASE_PUBLIC_PROTOCOL: http
      LIBSQL_SERVER_IMAGE: ghcr.io/tursodatabase/libsql-server:latest
    volumes:
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:5000/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
    ports:
      - '5001:5001'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
    depends_on:
      - backend
    restart: unless-stopped
